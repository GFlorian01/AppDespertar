<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#111009"/>

  <!-- Sun rays -->
  <line x1="16" y1="13" x2="16" y2="9.5"  stroke="#e07d45" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="20"  y1="14.1" x2="22"  y2="11.3" stroke="#e07d45" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="12"  y1="14.1" x2="10"  y2="11.3" stroke="#e07d45" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="23"  y1="17.5" x2="26"  y2="16"   stroke="#e07d45" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="9"   y1="17.5" x2="6"   y2="16"   stroke="#e07d45" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Horizon line -->
  <line x1="3" y1="22" x2="29" y2="22" stroke="#e07d45" stroke-width="0.9" stroke-linecap="round" opacity="0.35"/>

  <!-- Sun glow (soft halo) -->
  <path d="M 9 22 A 7 7 0 0 1 23 22 Z" fill="#e07d45" opacity="0.18"/>

  <!-- Sun semicircle -->
  <path d="M 10 22 A 6 6 0 0 1 22 22 Z" fill="#e07d45"/>

  <!-- Sun highlight -->
  <path d="M 11.8 22 A 4.2 4.2 0 0 1 18 18.1 A 4.2 4.2 0 0 1 20.2 22 Z" fill="#f5a05a" opacity="0.5"/>
</svg>
